name: Go
on: [push]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Get dependencies
      run: |
        go mod download

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
      if: startsWith(github.ref, 'refs/tags/')

    - name: Build and Package Chrome Extension
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd chrome-extension
        export NODE_OPTIONS=--openssl-legacy-provider
        yarn install
        yarn build
        cp -r public/* dist/
        zip -r go-shp-chrome-extension.zip dist/

    - name: Build release binaries
      if: startsWith(github.ref, 'refs/tags/')
      run: make clean releases

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          bin/go-shp-*.gz
          bin/go-shp-*.zip
          chrome-extension/go-shp-chrome-extension.zip

