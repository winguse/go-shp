<!DOCTYPE html>
<html>

<head>
  <title>Secure HTTP Proxy</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Secure HTTP Proxy </h1>
  <div class="half">
    <div class="half">
      <h3>Latency</h3>
      <pre id="latency"></pre>
    </div>
    <div class="half">
      <h3>Variance</h3>
      <pre id="variance"></pre>
    </div>
    <p>
      <input id="latency-test" type="button" value="Latency Test"/>
    </p>
    <canvas id="latency-test-history"></canvas>
  </div>
  <div class="half">
    <h2>Options</h2>
    <div style="margin-bottom: 10px;">
      <p>
        <label>Username: <input type="text" id="ui-username" style="width: 200px;"/></label>
      </p>
      <p>
        <label>Token: <input type="password" id="ui-token" style="width: 200px;"/></label>
      </p>
      <p>
        <label>Auth Base Path: <input type="text" id="ui-auth-path" style="width: 200px;"/></label>
      </p>
      <p>
        <input id="ui-sync" type="button" value="Update YAML from UI"/>
      </p>
    </div>
    <p>
      <input id="save" type="button" value="Save"/>
      <input id="export" type="button" value="Export Config"/>
      <input id="import" type="button" value="Import Config" onclick="document.getElementById('import-file').click();"/>
      <input type="file" id="import-file" style="display: none;" accept=".yaml,.yml"/>
    </p>
    <div id="message"></div>
    <div id="config"></div>
  </div>
  <script src="js/options.js"></script>
</body>

</html>
